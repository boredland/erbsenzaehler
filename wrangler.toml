name = "erbsenzaehler"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "gartenapp-db"
database_id = "YOUR_DATABASE_ID"  # Run: npm run db:create, then paste the ID here

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "gartenapp-photos"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
